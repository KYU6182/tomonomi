<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>とも飲み＠福岡 - Fukuoka Neo-Night</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Leaflet.js (Map Library) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Tailwind設定 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        night: {
                            900: '#0f172a',
                            800: '#1e293b',
                            card: 'rgba(30, 41, 59, 0.7)',
                        },
                        neon: {
                            pink: '#ec4899',
                            purple: '#8b5cf6',
                            blue: '#3b82f6',
                            green: '#10b981',
                            yellow: '#fbbf24',
                            hotpepper: '#eb4d3d', // HotPepper公式風の赤
                        }
                    },
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'bounce-sm': 'bounceSmall 0.3s',
                    },
                    keyframes: {
                        bounceSmall: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(0.8)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #000; 
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
        }

        #root {
            width: 100%;
            max-width: 430px;
            background-color: #0f172a;
            position: relative;
            box-shadow: 0 0 50px rgba(139, 92, 246, 0.2);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

        .fixed-center {
            position: absolute; /* PCビューの中央固定枠に対しての絶対配置 */
            left: 0;
            width: 100%;
        }

        /* Leaflet Map Overrides */
        .leaflet-container {
            background: #0f172a !important;
            font-family: 'Noto Sans JP', sans-serif;
        }
        .leaflet-control-attribution { display: none !important; }

        /* カスタムネオンマーカー用CSS (Tailwind CDNだと動的クラスが効かない対策) */
        .neon-marker-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
        }
        .neon-pulse {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background-color: inherit;
            animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
            opacity: 0.5;
        }
        .neon-dot {
            position: relative;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 10;
        }
        /* 通常イベントはピンク */
        .theme-normal { background-color: #ec4899; box-shadow: 0 0 15px rgba(236,72,153,0.8); }
        /* ホットペッパーは赤 */
        .theme-hotpepper { background-color: #eb4d3d; box-shadow: 0 0 15px rgba(235,77,61,0.8); }
    </style>
</head>
<body>

        ];

        // イベントデータ（緯度経度・isHotPepperフラグ付き）
        const EVENTS = [
            {

                location: "天神 今泉エリア",

                status: "あと1名",

                participantSummary: "現在 4/5名",
                participantDetail: "女性2名(20代)、男性2名(20代)",
                description: "今日のZepp Fukuokaライブ最高でしたね！この余韻のまま語り合いましょう！",
                conditions: ["ライブ参戦者限定", "20代〜30代中心"],
                venue: {
                    name: "隠れ家個室 酔鯨亭",
                    feature: "完全個室で周りを気にせず語れます。日本酒と鮮魚が自慢。",
                    menuImages: [

                    ]
                },
                host: USERS[1], participants: [USERS[1], USERS[2], USERS[3], USERS[4]]
            },
            {
                id: 4,
                title: "【女子限定】クリープハイプ飲み（天神・大名）",
                location: "天神 大名エリア",
                lat: 33.5878, lng: 130.3954, // 大名付近
                isHotPepper: false,
                time: "本日 20:00~",
                price: "¥3,000",
                image: "https://images.unsplash.com/photo-1466637574441-749b8f19452f?w=800&q=80",
                status: "あと2名",
                statusColor: "bg-pink-500/90",
                participantSummary: "現在 3/5名",
                participantDetail: "女性3名(20代)",
                description: "女子だけで気兼ねなく！スイーツも美味しいお店です🍰",
                conditions: ["女性限定", "20代中心"],
                venue: {
                    name: "Cafe & Bar Honey",
                    feature: "ソファ席でゆったり。オリジナルカクテルと夜パフェが人気。",
                    menuImages: [
                        "https://images.unsplash.com/photo-1563223163-548c772dc8c2?w=150&q=80",
                        "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=150&q=80"
                    ]
                },
                host: USERS[3], participants: [USERS[3], USERS[1], USERS[5]]
            },
            {
                id: 5,
                title: "【男限定】クリープハイプ飲み（中洲川端）",
                location: "中洲エリア",
                lat: 33.5930, lng: 130.4045, // 中洲付近

                image: "https://images.unsplash.com/photo-1515539075675-d523097c2f62?w=800&q=80",

                venue: {

                    menuImages: [

            {
                id: 2,
                title: "【本日開催】ホークス勝機！祝勝会",
                location: "PayPayドーム周辺",
                lat: 33.5954, lng: 130.3621, // ドーム付近
                isHotPepper: true,
                time: "本日 21:30~",

                image: "https://images.unsplash.com/photo-1551632811-561732d1e306?w=800&q=80",
                status: "募集中",
                statusColor: "bg-green-500/90",
                participantSummary: "現在 2/10名",
                participantDetail: "女性0名、男性2名(30代)",
                description: "勝ったばーい！！この勢いで祝杯をあげましょう🍻",
                conditions: ["ホークスファン", "誰でも歓迎"],
                venue: {
                    name: "大衆酒場 鷹の爪",
                    feature: "大型モニターあり。試合のハイライトを見ながら飲めます！",
                    menuImages: [

                        "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=150&q=80"
                    ]
                },
                host: USERS[6], participants: [USERS[6], USERS[8]]
            }
        ];

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        // --- Map Component (Leaflet) ---
        const MapView = ({ events, onMarkerClick }) => {
            useEffect(() => {
                // 地図の初期化
                const map = L.map('leaflet-map', {
                    zoomControl: false,
                    attributionControl: false
                }).setView([33.5902, 130.3959], 14); // 天神中心

                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

                events.forEach(event => {
                    if (event.lat && event.lng) {
                        const isHot = event.isHotPepper;
                        const themeClass = isHot ? 'theme-hotpepper' : 'theme-normal';
                        
                        // カスタムマーカーHTML
                        const iconHtml = `
                            <div class="neon-marker-container">
                                <div class="neon-pulse ${themeClass}"></div>
                                <div class="neon-dot ${themeClass}">🍻</div>
                            </div>
                        `;

                        const icon = L.divIcon({
                            html: iconHtml,
                            className: '', // Leafletデフォルトの背景を消す
                            iconSize: [44, 44],
                            iconAnchor: [22, 22]
                        });

                        const marker = L.marker([event.lat, event.lng], { icon }).addTo(map);
                        marker.on('click', () => onMarkerClick(event));
                    }
                });

                // コンテナのサイズが変わった際に地図がグレーアウトするのを防ぐ
                setTimeout(() => {
                    map.invalidateSize();
                }, 100);

                return () => {
                    map.remove();
                };
            }, [events]);

            return <div id="leaflet-map" className="absolute inset-0 w-full h-full z-0"></div>;
        };

        // --- Bottom Sheet Component ---
        const BottomSheet = ({ event, onClose }) => {
            const [show, setShow] = useState(false);

            useEffect(() => {
                if (event) {
                    setShow(true);
                } else {
                    setShow(false);
                }
            }, [event]);

            if (!event) return null;

            return (
                <div className="fixed-center top-0 h-full z-[100] pointer-events-none">
                    {/* Backdrop */}
                    <div 
                        className={`absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity duration-300 pointer-events-auto ${show ? 'opacity-100' : 'opacity-0'}`}
                        onClick={onClose}
                    ></div>

                    {/* Sheet Content */}
                    <div className={`absolute bottom-0 left-0 right-0 bg-night-800 rounded-t-[2.5rem] overflow-hidden transition-transform duration-500 ease-out transform pointer-events-auto ${show ? 'translate-y-0' : 'translate-y-full'} h-[92%] shadow-2xl border-t border-white/10 flex flex-col`}>
                        
                        <div className="absolute top-0 left-0 w-full h-12 flex items-center justify-center z-20 bg-gradient-to-b from-black/60 to-transparent pointer-events-none">
                            <div className="w-12 h-1.5 bg-white/30 rounded-full"></div>
                        </div>

                        {/* Image Header */}
                        <div className="relative h-56 w-full flex-shrink-0">
                            <img src={event.image} className="w-full h-full object-cover" />
                            <div className="absolute inset-0 bg-gradient-to-b from-transparent to-night-800"></div>

                            <button onClick={onClose} className="absolute top-4 right-4 w-10 h-10 bg-black/30 backdrop-blur-md rounded-full flex items-center justify-center text-white border border-white/10 z-30 cursor-pointer active:scale-95 transition-transform">
                                <Icon name="x" size={20} />
                            </button>
                        </div>

                        {/* Scrollable Content */}
                        <div className="flex-1 overflow-y-auto -mt-6 relative z-10 px-6 pb-32">
                             <div className="flex items-center justify-between mb-2">
                                <div className="flex items-center space-x-2">
                                    <span className="text-neon-pink font-bold text-[10px] tracking-widest uppercase bg-neon-pink/10 px-2 py-1 rounded border border-neon-pink/20">Host</span>
                                    <span className="text-xs font-bold text-white">{event.host.name}</span>
                                </div>
                            </div>
                            
                            <h2 className="text-2xl font-black mb-3 leading-tight text-white">{event.title}</h2>
                            
                            <div className="flex flex-wrap gap-2 mb-4">
                                <span className={`px-3 py-1 text-xs font-bold rounded-full text-white shadow-lg ${event.statusColor}`}>
                                    {event.status}
                                </span>
                            </div>

                            <div className="mb-6">
                                <p className="text-sm text-slate-200 leading-relaxed font-medium">
                                    {event.description}
                                </p>
                            </div>

                            {/* Venue Details & HotPepper Badges */}
                            <div className="mb-8">
                                <h3 className="text-sm font-bold text-slate-300 mb-3 flex items-center">
                                    <Icon name="store" size={16} className="mr-2 text-neon-blue" />

                                </h3>

                                    <div className="flex justify-between items-start mb-2">
                                        <div>
                                            <p className="font-bold text-white mb-1">{event.venue.name}</p>
                                            <p className="text-[10px] text-slate-400">{event.location}</p>
                                        </div>
                                    </div>

                                    {/* ★リクエスト箇所：ホットペッパーのバッジ */}
                                    {event.isHotPepper && (
                                        <div className="flex flex-wrap gap-2 mb-3">
                                            <span className="bg-red-600 text-white text-[10px] font-black px-2 py-1 rounded-md flex items-center shadow-md border border-red-500">
                                                🔥 即予約OK
                                            </span>
                                            <span className="bg-yellow-400 text-black text-[10px] font-black px-2 py-1 rounded-md flex items-center shadow-md border border-yellow-500">
                                                🅿️ ポイント貯まる
                                            </span>
                                        </div>
                                    )}

                                    <p className="text-xs text-slate-400 mb-4">{event.venue.feature}</p>
                                    
                                    <div className="flex overflow-x-auto no-scrollbar space-x-3 -mx-2 px-2">
                                        {event.venue.menuImages.map((img, i) => (
                                            <img key={i} src={img} className="w-20 h-20 rounded-lg object-cover border border-white/10 flex-shrink-0" />
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <h3 className="text-sm font-bold mb-4 flex items-center text-slate-300">
                                <span>参加メンバー</span>
                                <span className="mx-2 text-slate-600">|</span>
                                <span className="text-[10px] font-normal text-slate-400">{event.participantSummary}</span>
                            </h3>
                            
                            <div className="flex flex-wrap gap-4">
                                {event.participants.map((user, i) => (
                                    <div key={i} className="flex flex-col items-center">
                                        <img src={user.image} className="w-12 h-12 rounded-full border-2 border-slate-700 object-cover bg-white" />
                                        <span className="text-[10px] mt-1.5 text-slate-400 font-medium">{user.name}</span>
                                    </div>

                            </div>

                        {/* ★リクエスト箇所：下部の予約ボタン */}
                        <div className="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-night-900 via-night-900 to-transparent pb-safe z-20">
                            {event.isHotPepper ? (
                                // ホットペッパー公式風の赤いボタン
                                <button className="w-full bg-gradient-to-r from-[#eb4d3d] to-[#d93a2b] text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-red-500/40 active:scale-95 transition-transform flex flex-col items-center justify-center cursor-pointer border border-red-400/50">
                                    <span className="text-[10px] opacity-90 mb-0.5 flex items-center">
                                        ホットペッパーグルメ経由で予約
                                        <Icon name="external-link" size={10} className="ml-1" />
                                    </span>
                                    <span className="text-lg tracking-wide flex items-center">
                                        即予約を確定する <span className="mx-2 opacity-50">|</span> {event.price}

                                </button>

                                // 通常のネオンピンクボタン
                                <button className="w-full bg-gradient-to-r from-neon-pink to-neon-purple text-white font-bold text-lg py-4 rounded-2xl shadow-lg shadow-neon-pink/30 active:scale-95 transition-transform flex items-center justify-center cursor-pointer">
                                    <span>参加予約する</span>
                                    <span className="mx-2 opacity-50">|</span>
                                    <span>{event.price}</span>
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [viewMode, setViewMode] = useState('list'); // 'list' or 'map'
            const [selectedEvent, setSelectedEvent] = useState(null);

            const NavItem = ({ name, icon, label }) => {
                const isActive = activeTab === name;
                return (
                    <button 
                        onClick={() => setActiveTab(name)}
                        className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-all duration-200 ${isActive ? 'text-neon-pink' : 'text-slate-400'}`}
                    >
                        <div className={`${isActive ? 'animate-bounce-sm' : ''}`}>
                            <Icon name={icon} size={24} className={isActive ? 'drop-shadow-[0_0_8px_rgba(236,72,153,0.5)]' : ''} />
                        </div>
                        <span className="text-[9px] font-medium">{label}</span>
                    </button>
                );
            };

            return (
                <div className="relative h-screen flex flex-col overflow-hidden bg-night-900 pb-safe">
                    
                    {/* Header */}
                    {activeTab === 'home' && (
                        <div className="z-30 glass flex-shrink-0">
                            <div className="flex items-center justify-between px-6 py-4">
                                <h1 className="text-xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-neon-pink to-neon-purple">
                                    TOMO NOMI
                                </h1>
                                
                                {/* リスト / マップ 切り替えトグル */}
                                <div className="flex bg-slate-800 rounded-full p-1 border border-white/10 shadow-inner">
                                    <button 
                                        onClick={() => setViewMode('list')}
                                        className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${viewMode === 'list' ? 'bg-slate-600 text-white shadow' : 'text-slate-400'}`}
                                    >
                                        リスト
                                    </button>
                                    <button 
                                        onClick={() => setViewMode('map')}
                                        className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all flex items-center ${viewMode === 'map' ? 'bg-slate-600 text-white shadow' : 'text-slate-400'}`}
                                    >
                                        <Icon name="map" size={12} className="mr-1" /> マップ
                                    </button>
                                </div>
                            </div>
                            
                            {viewMode === 'list' && (
                                <div className="flex overflow-x-auto no-scrollbar px-6 pb-2 transition-all">
                                    {STORIES.map(story => (
                                        <div key={story.id} className="flex flex-col items-center mr-4 cursor-pointer active:scale-95 flex-shrink-0">
                                            <div className={`w-[60px] h-[60px] rounded-full p-[2px] bg-gradient-to-tr ${story.color}`}>
                                                <div className="w-full h-full rounded-full border-2 border-night-900 overflow-hidden">
                                                    <img src={story.img} className="w-full h-full object-cover" />
                                                </div>
                                            </div>
                                            <span className="mt-1 text-[9px] text-slate-300 font-medium truncate w-[60px] text-center">{story.tag}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Main Content Area */}
                    <div className="flex-1 relative w-full h-full">
                        {activeTab === 'home' ? (
                            viewMode === 'map' ? (
                                // Map View
                                <div className="absolute inset-0 z-0 bg-night-900">
                                    <MapView events={EVENTS} onMarkerClick={setSelectedEvent} />
                                    {/* マップ上部の影 */}
                                    <div className="absolute top-0 left-0 w-full h-6 bg-gradient-to-b from-night-900 to-transparent z-10 pointer-events-none"></div>
                                </div>
                            ) : (
                                // List View
                                <div className="absolute inset-0 overflow-y-auto px-6 pt-4 pb-28">
                                    {EVENTS.map(event => (
                                        <div 
                                            key={event.id}
                                            onClick={() => setSelectedEvent(event)}
                                            className="mb-6 relative w-full aspect-[4/5] sm:aspect-[16/9] rounded-3xl overflow-hidden active:scale-[0.98] transition-all duration-200 shadow-2xl shadow-neon-purple/10 cursor-pointer group"
                                        >
                                            <img src={event.image} className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                            <div className="absolute inset-0 bg-gradient-to-t from-night-900 via-night-900/40 to-transparent"></div>
                                            
                                            <div className="absolute top-4 left-4 flex flex-col gap-2">
                                                <span className={`px-3 py-1 text-xs font-bold rounded-full backdrop-blur-md shadow-lg w-max text-white ${event.statusColor}`}>
                                                    {event.status}
                                                </span>
                                            </div>

                                            {/* ★リクエスト箇所：リスト画面のホットペッパーバッジ */}
                                            {event.isHotPepper && (
                                                <div className="absolute top-4 right-4 flex flex-col items-end gap-1">
                                                    <span className="bg-red-600 text-white text-[9px] font-black px-2 py-1 rounded shadow-lg flex items-center border border-red-500">
                                                        🔥 即予約OK
                                                    </span>
                                                    <span className="bg-yellow-400 text-black text-[9px] font-black px-2 py-1 rounded shadow-lg flex items-center border border-yellow-500">
                                                        🅿️ ポイント貯まる
                                                    </span>
                                                </div>
                                            )}

                                            <div className="absolute bottom-0 left-0 w-full p-5 pb-6">
                                                <div className="flex items-center text-neon-pink text-xs font-bold mb-1 tracking-wider uppercase">
                                                    <Icon name="map-pin" size={12} className="mr-1" />
                                                    {event.location}
                                                </div>
                                                <h3 className="text-xl font-bold leading-tight mb-3 text-white">
                                                    {event.title}
                                                </h3>
                                                <div className="flex items-center justify-between mt-3">
                                                    <span className="text-xs text-slate-400">{event.time}</span>
                                                    <div className="flex items-center space-x-2 bg-neon-purple/80 px-3 py-1.5 rounded-full backdrop-blur-sm shadow-lg shadow-neon-purple/20">
                                                        <span className="text-sm font-bold text-white">{event.price}</span>
                                                        <Icon name="chevron-right" size={14} className="text-white" />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )
                        ) : (
                            <div className="flex flex-col items-center justify-center h-full text-slate-500">
                                <Icon name="lock" size={48} className="mb-4 opacity-50" />
                                <p>この機能はMVP版では制限されています</p>
                            </div>
                        )}
                    </div>

                    {/* Bottom Navigation */}
                    <div className="fixed-center bottom-0 h-20 glass flex items-center justify-around z-40 border-t border-slate-800">
                        <NavItem name="home" icon="home" label="ホーム" />
                        <NavItem name="search" icon="search" label="さがす" />
                        <div className="relative -top-6">
                            <button className="w-14 h-14 rounded-full bg-gradient-to-r from-neon-pink to-neon-purple flex items-center justify-center shadow-lg shadow-neon-pink/40 active:scale-90 transition-transform text-white">
                                <Icon name="plus" size={28} />
                            </button>
                        </div>
                        <NavItem name="chat" icon="message-circle" label="チャット" />
                        <NavItem name="host" icon="user" label="マイページ" />
                    </div>

                    {/* Details Modal */}
                    <BottomSheet event={selectedEvent} onClose={() => setSelectedEvent(null)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
</body>
</html>
